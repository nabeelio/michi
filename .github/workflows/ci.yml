name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress PR runs when a new commit lands on the same PR.
# Push-to-main runs are NOT cancelled (each commit on main deserves a full
# verification) — the cancel-in-progress conditional scopes cancellation
# to pull_request events only.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0              # MinVer requires full tag history

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          cache: true
          cache-dependency-path: |
            **/Directory.Packages.props
            **/*.csproj

      - name: Restore dependencies
        run: dotnet restore Michi.slnx

      - name: Build
        run: dotnet build Michi.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/Michi.Tests/Michi.Tests.csproj -c Release --no-build

      - name: Pack
        run: dotnet pack src/Michi/Michi.csproj -c Release --no-build --nologo --output ./artifacts
