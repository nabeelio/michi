name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress PR runs when a new commit lands on the same PR.
# Push-to-main runs are NOT cancelled (each commit on main deserves a full
# verification) — the cancel-in-progress conditional scopes cancellation
# to pull_request events only.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0              # MinVer requires full tag history

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          cache: true
          cache-dependency-path: |
            **/dotnet-tools.json
            **/Directory.Packages.props
            **/*.csproj

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore Segments.slnx

      - name: Build
        run: dotnet build Segments.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/Segments.Tests/Segments.Tests.csproj -c Release --no-build

      - name: Inspect
        shell: pwsh
        run: |
          dotnet tool run jb -- inspectcode Segments.slnx --output=inspect.xml --format=Xml --severity=WARNING --no-build
          $issues = Select-String -Path inspect.xml -Pattern '<Issue ' -SimpleMatch
          if ($issues) {
            throw "ReSharper inspectcode found $($issues.Count) issue(s)."
          }

      - name: Pack
        run: dotnet pack src/Segments/Segments.csproj -c Release --no-build --nologo --output ./artifacts
