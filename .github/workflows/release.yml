name: Release

# Triggered by pushing a tag matching v* (e.g., v1.0.0, v1.0.0-beta.1).
# MinVer (configured in Directory.Build.props) interprets the tag as the
# package version: v1.2.3 -> 1.2.3, v1.0.0-beta.1 -> 1.0.0-beta.1.

on:
  push:
    tags: ['v*']

permissions: {}

jobs:
  # Cheap Ubuntu sanity pass before spending Windows minutes on signing.
  # CI on main already validated this commit, but this guards against
  # tags created on branches that didn't run CI.
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          cache: true
          cache-dependency-path: |
            **/dotnet-tools.json
            **/Directory.Packages.props
            **/*.csproj

      - run: dotnet tool restore
      - run: dotnet restore Segments.slnx
      - run: dotnet build Segments.slnx -c Release --no-restore
      - run: dotnet test tests/Segments.Tests/Segments.Tests.csproj -c Release --no-build
      - shell: pwsh
        run: |
          dotnet tool run jb -- inspectcode Segments.slnx --output=inspect.xml --format=Xml --severity=WARNING --no-build
          $issues = Select-String -Path inspect.xml -Pattern '<Issue ' -SimpleMatch
          if ($issues) {
            throw "ReSharper inspectcode found $($issues.Count) issue(s)."
          }

  # Signing via dotnet/sign requires Windows (Authenticode tooling is Windows-only).
  pack-sign-publish:
    needs: validate
    runs-on: windows-latest
    environment: release
    timeout-minutes: 30
    permissions:
      contents: write      # Checkout and create GitHub Release
      id-token: write      # Azure OIDC federated login
      packages: write      # Push to GitHub Packages
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          cache: true
          cache-dependency-path: |
            **/dotnet-tools.json
            **/Directory.Packages.props
            **/*.csproj

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore Segments.slnx

      - name: Build
        run: dotnet build Segments.slnx -c Release --no-restore

      - name: Pack
        run: dotnet pack Segments.slnx -c Release --no-build --output ./artifacts

      - name: Verify tag matches MinVer-produced version
        shell: pwsh
        run: |
          $expected = $env:GITHUB_REF_NAME.TrimStart('v')
          $nupkgs = Get-ChildItem ./artifacts -Filter *.nupkg
          if ($nupkgs.Count -eq 0) {
            throw "No .nupkg produced in ./artifacts"
          }
          foreach ($pkg in $nupkgs) {
            # MinVer appends version after the package id, e.g. Segments.1.2.3.nupkg
            # Use a regex escape on the version so '.' matches literally.
            $escaped = [regex]::Escape($expected)
            if ($pkg.Name -notmatch "\.$escaped\.nupkg$") {
              throw "Version mismatch: tag=$expected  nupkg=$($pkg.Name)"
            }
          }
          Write-Host "Verified: all nupkg versions match tag $expected"

      - name: Generate SBOM
        run: dotnet tool run dotnet-CycloneDX src/Segments/Segments.csproj --output ./artifacts --filename segments.cyclonedx.json --output-format Json

      - name: Azure OIDC login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign packages
        shell: pwsh
        run: |
          dotnet tool run sign code azure-key-vault `
            *.nupkg `
            --base-directory "${{ github.workspace }}/artifacts" `
            --publisher-name "Nabeel Shahzad" `
            --description "Segments: strongly-typed absolute paths for .NET" `
            --description-url "https://github.com/nabeelio/Segments" `
            --timestamp-url "http://timestamp.digicert.com" `
            --azure-credential-type azure-cli `
            --azure-key-vault-url "${{ secrets.KEY_VAULT_URL }}" `
            --azure-key-vault-certificate "${{ secrets.KEY_VAULT_CERT_NAME }}"

      # `dotnet nuget push` does not shell-expand wildcards on Windows + pwsh:
      # passing `"./artifacts/*.nupkg"` literally yields `File does not exist`
      # (NuGet/Home#4393). Resolve the glob in PowerShell and push each file.
      - name: Publish to GitHub Packages
        shell: pwsh
        run: |
          Get-ChildItem ./artifacts/*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --source "https://nuget.pkg.github.com/nabeelio/index.json" `
              --api-key "${{ secrets.GITHUB_TOKEN }}" `
              --skip-duplicate
          }

      - name: Publish to NuGet.org
        shell: pwsh
        run: |
          Get-ChildItem ./artifacts/*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --source "https://api.nuget.org/v3/index.json" `
              --api-key "${{ secrets.NUGET_API_KEY }}" `
              --skip-duplicate
          }

      - name: Publish symbols to NuGet.org
        shell: pwsh
        run: |
          Get-ChildItem ./artifacts/*.snupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --source "https://api.nuget.org/v3/index.json" `
              --api-key "${{ secrets.NUGET_API_KEY }}" `
              --skip-duplicate
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
            ./artifacts/segments.cyclonedx.json
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
